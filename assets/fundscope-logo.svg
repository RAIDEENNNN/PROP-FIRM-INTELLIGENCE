<svg width="720" height="220" viewBox="0 0 720 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FundScope logo</title>
  <desc id="desc">A shield-shaped scope mark with a golden trading signal beside the FundScope wordmark.</desc>
  <rect width="720" height="220" rx="42" fill="#0B1024"/>
  <circle cx="618" cy="40" r="156" fill="#4F46E5" opacity=".18"/>
  <circle cx="94" cy="180" r="120" fill="#FFCA5C" opacity=".1"/>
  <g transform="translate(50 44)">
