    <path d="M66 17 105 33.2v32.4c0 25-16 44.7-39 53.4-23-8.7-39-28.4-39-53.4V33.2L66 17Z" fill="#11142A" fill-opacity=".42" stroke="white" stroke-opacity=".18" stroke-width="2"/>
    <circle cx="66" cy="67" r="36" stroke="white" stroke-opacity=".62" stroke-width="7"/>
